@if (results()?.verses?.length) {
  <ion-text class="search-results-count">
    <sub>
      {{ TextKey.Showing | translate }} {{ results()?.verses?.length }} {{ TextKey.Of | translate }}
      {{ results()?.count }}
    </sub>
  </ion-text>
  <ion-list>
    @for (verse of results()?.verses; track $index) {
      <ion-item
        [routerLink]="['/read', verse.translation, verse.bookUsfm, verse.chapter]"
        [queryParams]="{ focusVerses: verse.verse, search: null }"
      >
        <ion-label>
          <div class="verse-header">
            <h2 [innerHTML]="getListHeader(verse) | highlightSearch: searchTerm()"></h2>
            <!-- <h3>{{ verse.canon.toUpperCase()}}</h3> -->
          </div>
          <p [innerHTML]="verse.text | highlightSearch: searchTerm()"></p>
        </ion-label>
      </ion-item>
    }
  </ion-list>
  @if (results()!.count > results()!.verses.length) {
    <ion-infinite-scroll [disabled]="loading()" (ionInfinite)="loadMore($event)">
      <ion-infinite-scroll-content></ion-infinite-scroll-content>
    </ion-infinite-scroll>
  }
}
